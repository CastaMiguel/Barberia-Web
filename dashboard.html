                <thead>
                    <tr>
                        <th>Cliente / Notas</th>
                        <th>Contacto</th>
                        <th>Fecha / Hora</th>
                        <th>Servicio</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        let showOnlyToday = false;

        function updateDashboard() {
            const citas = getCitas();
            const ahora = new Date();
            const hoyStr = ahora.toISOString().split('T')[0];

            // Renderizado de KPIs
            document.getElementById('kpi-total').textContent = citas.length;
            document.getElementById('kpi-pendiente').textContent = citas.filter(c => c.estado === 'Pendiente').length;
            document.getElementById('kpi-confirmada').textContent = citas.filter(c => c.estado === 'Confirmada').length;
            document.getElementById('kpi-cancelada').textContent = citas.filter(c => c.estado === 'Cancelada').length;
            document.getElementById('kpi-finalizada').textContent = citas.filter(c => c.estado === 'Finalizada').length;
            
            const deHoy = citas.filter(c => c.fecha === hoyStr);
            document.getElementById('kpi-hoy').textContent = deHoy.length;

            // Mensaje Personalizado
            document.getElementById('welcome-message').textContent = `Bienvenido, Administrador. Hoy tienes ${deHoy.length} citas asignadas.`;

            // Buscar la "Próxima Cita" activa más cercana en el tiempo
            const proximas = citas
                .filter(c => c.estado !== 'Cancelada' && c.estado !== 'Finalizada')
                .filter(c => new Date(c.fecha + 'T' + c.hora) >= ahora)
                .sort((a, b) => new Date(a.fecha + 'T' + a.hora) - new Date(b.fecha + 'T' + b.hora));

            const kpiProxima = document.getElementById('kpi-proxima');
            if (proximas.length > 0) {
                kpiProxima.innerHTML = `<strong>${proximas[0].nombre}</strong> (${proximas[0].hora})`;
            } else {
                kpiProxima.textContent = "Ninguna pendiente";
            }

            // Filtrado Dinámico
            const searchVal = document.getElementById('search-input').value.toLowerCase();
            const filterFecha = document.getElementById('filter-fecha').value;
            const filterEstado = document.getElementById('filter-estado').value;
            const filterServicio = document.getElementById('filter-servicio').value;

            const filtered = citas.filter(c => {
                const matchSearch = c.nombre.toLowerCase().includes(searchVal) || c.email.toLowerCase().includes(searchVal) || c.telefono.includes(searchVal);
                const matchFecha = filterFecha ? c.fecha === filterFecha : true;
                const matchEstado = filterEstado ? c.estado === filterEstado : true;
                const matchServicio = filterServicio ? c.servicio === filterServicio : true;
                const matchTodayOnly = showOnlyToday ? c.fecha === hoyStr : true;

                return matchSearch && matchFecha && matchEstado && matchServicio && matchTodayOnly;
            });

            // Ordenamiento Dinámico (Por Fecha/Hora o por Nombre alfabéticamente)
            const sortBy = document.getElementById('sort-by').value;
            if (sortBy === 'nombre') {
                filtered.sort((a, b) => a.nombre.localeCompare(b.nombre));
            } else {
                filtered.sort((a, b) => new Date(a.fecha + 'T' + a.hora) - new Date(b.fecha + 'T' + b.hora));
            }

            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            if(filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:var(--text-secondary);">No se encontraron registros coincidentes.</td></tr>`;
                return;
            }

            filtered.forEach(c => {
                const tr = document.createElement('tr');
                tr.className = 'animate-fade';
                tr.innerHTML = `
                    <td>
                        <strong>${c.nombre}</strong><br>
                        <small style="color:var(--text-secondary);">${c.observaciones || 'Sin comentarios'}</small>
                    </td>
                    <td>
                        ${c.telefono}<br>
                        <small>${c.email}</small>
                    </td>
                    <td>
                        ${c.fecha}<br>
                        <strong>${c.hora}</strong>
                    </td>
                    <td>${c.servicio}</td>
                    <td>
                        <select onchange="changeStatus('${c.id}', this.value)" class="badge ${c.estado}">
                            <option value="Pendiente" ${c.estado === 'Pendiente' ? 'selected' : ''}>Pendiente</option>
                            <option value="Confirmada" ${c.estado === 'Confirmada' ? 'selected' : ''}>Confirmada</option>
                            <option value="Cancelada" ${c.estado === 'Cancelada' ? 'selected' : ''}>Cancelada</option>
                            <option value="Finalizada" ${c.estado === 'Finalizada' ? 'selected' : ''}>Finalizada</option>
                        </select>
                    </td>
                    <td>
                        <button onclick="editAppointment('${c.id}')" class="btn" style="padding:0.25rem 0.5rem; font-size:0.8rem; background-color:#3b82f6;">Editar</button>
                        <button onclick="deleteAppointment('${c.id}')" class="btn" style="padding:0.25rem 0.5rem; font-size:0.8rem; background-color:var(--toast-error);">Eliminar</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Funciones de gestión de estado y edición integradas del código base original
        function changeStatus(id, newStatus) {
            const citas = getCitas();
            const index = citas.findIndex(c => c.id === id);
            if(index !== -1) {
                citas[index].estado = newStatus;
                saveCitas(citas);
                showToast("Estado modificado exitosamente.", "success");
                updateDashboard();
            }
        }

        function deleteAppointment(id) {
            if(confirm("¿Está seguro de que desea eliminar permanentemente esta cita?")) {
                let citas = getCitas();
                citas = citas.filter(c => c.id !== id);
                saveCitas(citas);
                showToast("Cita eliminada del sistema.", "success");
                updateDashboard();
            }
        }

        function editAppointment(id) {
            const citas = getCitas();
            const appointment = citas.find(c => c.id === id);
            if (appointment) {
                const nuevoNombre = prompt("Modificar Nombre Completo:", appointment.nombre);
                if (!nuevoNombre || nuevoNombre.trim().length < 3 || !/^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$/.test(nuevoNombre)) {
                    showToast("Edición fallida: Nombre vacío, muy corto o con caracteres inválidos.", "error");
                    return;
                }
                
                const nuevoTelefono = prompt("Modificar Teléfono:", appointment.telefono);
                if (!nuevoTelefono || !/^\d+$/.test(nuevoTelefono)) {
                    showToast("Edición fallida: Teléfono inválido.", "error");
                    return;
                }

                appointment.nombre = nuevoNombre.trim();
                appointment.telefono = nuevoTelefono.trim();
                saveCitas(citas);
                showToast("Cita actualizada de forma exitosa.", "success");
                updateDashboard();
            }
        }

        // Listeners únicos de los filtros en tiempo real
        document.getElementById('search-input').addEventListener('input', updateDashboard);
        document.getElementById('filter-fecha').addEventListener('change', updateDashboard);
        document.getElementById('filter-estado').addEventListener('change', updateDashboard);
        document.getElementById('filter-servicio').addEventListener('change', updateDashboard);
        document.getElementById('sort-by').addEventListener('change', updateDashboard);
        
        document.getElementById('btn-hoy-filter').addEventListener('click', function() {
            showOnlyToday = !showOnlyToday;
            this.classList.toggle('btn-active', showOnlyToday);
            updateDashboard();
        });

        // Carga inicial
        window.onload = updateDashboard;
    </script>
</body>
</html>
